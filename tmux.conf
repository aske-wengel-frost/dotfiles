# Mouse support (scroll, resize panes, select windows/panes)
set -g mouse on

# Start windows and panes at 1, not 0
set -g base-index 1
setw -g pane-base-index 1

# Set prefix to Ctrl-Space (avoids conflicts with nvim C-w window commands)
unbind C-b
set -g prefix C-Space
bind C-Space send-prefix

# Pane navigation (prefix + h/j/k/l, no Ctrl needed — avoids clashing with nvim C-h/j/k/l)
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Pane resizing with Ctrl+arrow (no prefix needed)
bind -n -r C-Left  resize-pane -L 5
bind -n -r C-Down  resize-pane -D 5
bind -n -r C-Up    resize-pane -U 5
bind -n -r C-Right resize-pane -R 5

# Splits
bind v split-window -h -c "#{pane_current_path}"
bind s split-window -v -c "#{pane_current_path}"

# Close pane
bind q kill-pane

# Windows (tabs)
bind t new-window -c "#{pane_current_path}"
bind n next-window
bind p previous-window

# Switch to window by number (prefix + number)
bind 1 select-window -t 1
bind 2 select-window -t 2
bind 3 select-window -t 3
bind 4 select-window -t 4
bind 5 select-window -t 5
bind 6 select-window -t 6
bind 7 select-window -t 7
bind 8 select-window -t 8
bind 9 select-window -t 9
